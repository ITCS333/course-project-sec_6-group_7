<!--
  Requirement: Create the Dedicated Page for a Single Resource

  Instructions:
  This page displays the details for one resource and allows for discussion.
  All content is loaded dynamically by details.js using the resource id
  from the URL query string (e.g., details.html?id=1).
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- TODO: Add meta tags for charset and viewport. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- TODO: Add a title. You can make it dynamic later, but for now, use "Resource Details". -->
    <title>Resource Details</title>

    <!-- TODO: Link to your CSS framework or stylesheet. -->
    <link rel="stylesheet" href="styles.css">

    <!-- TODO: Link this script file:
         <script src="details.js" defer></script> -->
             <script src="details.js" defer></script>

</head>
<body>
    <!-- TODO: Create a 'header' with a main heading ('h1').
         Add id="resource-title" to the <h1>. This id is required by details.js. -->
  <header>
        <h1 id="resource-title">Resource Details</h1>
    </header>

    <!-- TODO: Create the 'main' content area. -->
     <main>
        <!-- Section 1: Resource Information -->
        <!-- TODO: Use an 'article' to display the main resource information. -->
         <article>
            <!-- TODO: Add a paragraph ('p') for the resource description.
                 Add id="resource-description" to this <p>. This id is required by details.js. -->
                                <p id="resource-description">This is a detailed description of the resource.</p>

            <!-- TODO: Add an anchor tag ('a') that links to the actual resource URL.
                 - Add id="resource-link" to this <a>. This id is required by details.js.
                 - Text should be "Access Resource Material".
                 - Add target="_blank" to open it in a new tab. -->
                             <a id="resource-link" href="#" target="_blank">Access Resource Material</a>

        <!-- End of article. -->
         </article>

        <!-- Section 2: Discussion Forum -->
        <!-- TODO: Create a 'section' for the discussion, with an 'id' of "discussion-forum". -->
                 <section id="discussion-forum">

            <!-- TODO: Add a sub-heading ('h2') "Discussion". -->
                         <h2>Discussion</h2>


            <!-- Subsection 2.1: Existing Comments -->
            <!-- TODO: Add a <div> for the list of comments.
                 Add id="comment-list" to this <div>. This id is required by details.js.
                 Comments will be injected here dynamically by details.js. -->
                 <div id="comment-list">

                <!-- Each comment follows this structure: -->
                <!-- TODO: Use an 'article' for each comment. -->
                 <article>
                    <!-- TODO: Use a 'p' for the comment text. -->
                     <p>This is a comment about the resource.</p>

                    <!-- TODO: Use a 'footer' to show the author
                         (e.g., "Posted by: Ali Hassan"). -->
                         <footer>Posted by: Ali Hassan</footer>

                <!-- End of comment article. -->
                 </article>

            <!-- End of comment list div. -->
             </div>

            <!-- Subsection 2.2: Add a Comment Form -->
            <!-- TODO: Create a 'form' for users to post new comments.
                 Add id="comment-form" to this <form>. This id is required by details.js.
                 Action can be '#'. -->
                 <form id="comment-form" action="#">

                <!-- TODO: Use a 'fieldset' to group the controls. -->
                 <fieldset>

                    <!-- TODO: Add a 'legend', e.g., "Leave a Comment". -->
                    <legend>Leave a Comment</legend>


                    <!-- TODO: Add a 'label' and 'textarea' for the comment box.
                         - label 'for': "new-comment"
                         - textarea 'id': "new-comment", required
                         This id is required by details.js. -->
                         <label for="new-comment">Comment:</label>
                         <textarea id="new-comment" required></textarea>
                    <!-- TODO: Add a 'button' to submit the comment.
                         - type="submit", Text: "Post Comment" -->
                         <button type="submit">Post Comment</button>

                <!-- End of fieldset. -->
                 </fieldset>
            <!-- End of form. -->
             </form>
        <!-- End of discussion section. -->
         </section>

    <!-- End of main. -->
     </main>
</body>
</html>
