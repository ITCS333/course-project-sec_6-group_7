<!--
  Requirement: Create the Student View for Course Resources

  Instructions:
  This page is a read-only view for students to see all available course materials.
  Each resource should link to a dedicated detail page.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- TODO: Add meta tags for charset and viewport. -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TODO: Add a title, e.g., "Course Resources". -->
         <title>Course Resources</title>

    <!-- TODO: Link to your CSS framework or stylesheet. -->
     <link rel="stylesheet" href="styles.css">

    <!-- TODO: Link this script file:
         <script src="list.js" defer></script> -->
             <script src="list.js" defer></script>

</head>
<body>

    <!-- TODO: Create a 'header' with a main heading ('h1') "Course Resources". -->
     <header>
        <h1>Course Resources</h1>
    </header>

    <!-- TODO: Create the 'main' content area. -->
     <main>

        <!-- TODO: Create a 'section' with id="resource-list-section" to contain
             the list of resources. This id is required by list.js. -->
             <section id="resource-list-section">

            <!-- Resources will be injected here dynamically by list.js.
                 Each resource will follow this structure: -->

            <!-- Example Resource Article Structure: -->
            <!-- TODO: Use an 'article' element for each resource. -->
             <article>
                <!-- TODO: Add a heading ('h2' or 'h3') for the resource title. -->
                 <h2>Example Resource Title</h2>

                <!-- TODO: Add a paragraph ('p') for the resource description. -->
                 <p>This is a brief description of the resource, explaining its content and importance.</p>

                <!-- TODO: Add an anchor tag ('a') that links to the detail page.
                     - The 'href' must be "details.html?id={resource_id}".
                     - This is set dynamically by list.js using the resource's id.
                     - The link text should be "View Resource & Discussion". -->
                     <a href="details.html?id=1">View Resource & Discussion</a>

            <!-- End of article. -->
             </article>

        <!-- End of resource list section. -->
         </section>
    <!-- End of main. -->
     </main>

</body>
</html>
