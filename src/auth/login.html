<!DOCTYPE html>
<html lang="en">
<head>
    <!-- TODO: Add the 'meta' tag to specify the character encoding for the document to be UTF-8. -->
    <meta charset="UTF-8">

    <!-- TODO: Add the 'meta' tag that makes the page responsive. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TODO: Add a 'title' for the page. -->
    <title>Login</title>

    <!-- TODO: Link to a CSS framework -->
    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">
</head>

<body style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <!-- TODO: Use the 'main' element -->
    <main>

        <!-- TODO: Create a 'section' element -->
        <section style="width:300px;">

            <!-- TODO: Add heading -->
            <h2>Welcome Back!</h2>

            <!-- TODO: Create form -->
            <form id="login-form" action="#">

                <!-- TODO: fieldset -->
                <fieldset>

                    <!-- TODO: legend -->
                    <legend>Secure Login</legend>

                    <!-- TODO: email label -->
                    <label for="email">Email Address</label>

                    <!-- TODO: email input -->
                    <input type="email" id="email" required>

                    <!-- TODO: password label -->
                    <label for="password">Password</label>

                    <!-- TODO: password input -->
                    <input type="password" id="password" required minlength="8">

                    <!-- TODO: submit button -->
                    <button type="submit" id="login">Log In</button>

                </fieldset>

                <!-- TODO: message container -->
                <div id="message-container"></div>

            </form>

        </section>

    </main>

    <!-- TODO: Link login.js -->
    <script src="login.js" defer></script>

</body>
</html>
