<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">

</head>

<body style="
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
">

    <main>

        <section style="
            width:350px;
            border:1px solid #ccc;
            padding:30px;
            border-radius:10px;
        ">

            <h1 style="text-align:center;">
                ITCS333 Learning Portal
            </h1>

            <form id="login-form" action="#">

                <fieldset>

                    <legend>Secure Login</legend>

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        required
                    >

                    <label for="password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="password"
                        minlength="8"
                        required
                    >

                    <button
                        type="submit"
                        id="login"
                    >
                        Log In
                    </button>

                </fieldset>

                <div id="message-container"></div>

            </form>

        </section>

    </main>

    <script src="login.js" defer></script>

</body>
</html>
