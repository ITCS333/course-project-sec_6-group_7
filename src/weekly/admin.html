<!--
  Requirement: Create the Admin View for the Weekly Breakdown

  Instructions:
  Fill in the HTML elements as described in the comments.
  This page allows the teacher (admin) to perform full CRUD operations
  on the weekly course content.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Weekly Breakdown</title>
    <script src="admin.js" defer></script>
</head>
<body>
<header>
  <h1>Manage Weekly Breakdown</h1>
</header>

<main>

<section>
  <h2>Add a New Week</h2>

  <form id="week-form">
    <fieldset>
      <legend>Weekly Details</legend>

      <label for="week-title">Title</label>
      <input type="text" id="week-title" required>

      <label for="week-start-date">Start Date</label>
      <input type="date" id="week-start-date" required>

      <label for="week-description">Description</label>
      <textarea id="week-description"></textarea>

      <label for="week-links">Links</label>
      <textarea id="week-links"></textarea>

      <button id="add-week" type="submit">Add Week</button>
    </fieldset>
  </form>
</section>

<section>
  <h2>Current Weekly Breakdown</h2>

  <table id="weeks-table">
    <thead>
      <tr>
        <th>Week Title</th>
        <th>Start Date</th>
        <th>Description</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody id="weeks-tbody"></tbody>
  </table>
</section>

</main>
</body>
</html>
