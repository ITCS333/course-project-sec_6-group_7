<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>

    <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">

    <script src="manage_users.js" defer></script>

</head>
<body style="padding: 25px 50px;">

    <header style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Admin Portal</h1>
        <nav style="display:flex; gap:20px;">

  <a href="../admin/manage_users.html">Users</a>

  <a href="../resources/admin.html">Resources</a>

  <a href="../weekly/admin.html">Weekly</a>

  <a href="../assignments/admin.html">Assignments</a>

  <a href="../discussion/board.html">Discussion</a>

  <a href="../../index.html">Logout</a>

</nav>
    </header>

    <main>

        <section style="max-width:700px; margin:70px auto 0 auto;">

            <h3>Change Your Password</h3>

            <form action="#" id="password-form" style="padding:25px; border:1px solid #ddd; border-radius:10px; background:#fafafa;">

                <fieldset>
                    <label for="current-password">Current Password</label>
                    <input type="password" id="current-password" required>

                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" minlength="8" required>

                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" required>

                    <button type="submit" id="change">Update Password</button>

                </fieldset>

            </form>

        </section>

        <section style="margin-top:60px; padding:30px; border:1px solid #ddd; border-radius:12px; background:#fafafa;">

            <h2 style="margin-bottom:10px;">Manage Users</h2>

            <details style="margin-bottom:25px;">

                <summary>Add New User</summary>

                <form action="#" id="add-user-form">

                    <fieldset>

                        <legend>New User Information</legend>

                        <label for="user-name">Full Name</label>
                        <input type="text" id="user-name" required>

                        <label for="user-email">Email</label>
                        <input type="email" id="user-email" required>

                        <label for="default-password">Password</label>
                        <input type="password" id="default-password" minlength="8" required>

                        <label for="is-admin">Role</label>
                        <select id="is-admin">
                            <option value="0">Student</option>
                            <option value="1">Admin</option>
                        </select>

                        <button style="padding:6px 12px;" type="submit" id="add">Add User</button>

                    </fieldset>

                </form>

            </details>

            <h3>Registered Users</h3>

            <input type="text" id="search-input" placeholder="Search by name or email...">

            <table id="user-table" style="font-size:0.95rem;">

                <thead>

                    <tr>

                        <th>Name</th>
                        <th>Email</th>
                        <th>Admin</th>
                        <th>Actions</th>

                    </tr>
                </thead>

                <tbody id="user-table-body">
                </tbody>

            </table>

        </section>

    </main>

</body>
</html>
